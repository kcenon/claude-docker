# docker-compose.firewall.yml
# Phase 4 opt-in: Grants network capabilities for container-level firewall rules
# Usage: append -f docker-compose.firewall.yml to any compose combination

services:
  claude-a:
    cap_add:
      - NET_ADMIN
      - NET_RAW

  claude-b:
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # Orchestration services (only applied when firewall overlay is included)
  manager:
    cap_add:
      - NET_ADMIN
      - NET_RAW

  worker-1:
    cap_add:
      - NET_ADMIN
      - NET_RAW

  worker-2:
    cap_add:
      - NET_ADMIN
      - NET_RAW

  worker-3:
    cap_add:
      - NET_ADMIN
      - NET_RAW
