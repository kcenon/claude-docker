# docker-compose.orchestration.yml
# Phase 5: Manager-Worker orchestration with Redis shared context
# Usage: docker compose -f docker-compose.yml -f docker-compose.orchestration.yml up -d
# SRS-8.1.1~9

services:
  redis:
    image: redis:7-alpine                                       # SRS-8.1.2
    env_file: .env
    command: ["sh", "-c", "redis-server --save 60 1 --loglevel notice --requirepass \"$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data                                        # SRS-8.1.3
    networks:
      - orchestration-internal                                  # SRS-8.6.2
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  manager:
    image: claude-code-base:latest                              # SRS-8.1.4
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ${PROJECT_DIR}:/workspace
      - ${HOME}/.claude-state/account-manager:/home/node/.claude # SRS-8.1.8
      - node_modules_manager:/workspace/node_modules
      - ./scripts:/scripts:ro                                   # SRS-8.1.5
      - ${HOME}/.claude-state/analysis-archive:/archive          # SRS-8.5.1
    networks:
      - orchestration-internal                                  # SRS-8.6.2
    env_file: .env                                              # SRS-8.6.1 secrets via env_file
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_MANAGER:-}
      - REDIS_HOST=redis                                        # SRS-8.6.2
      - REDIS_PORT=6379                                         # SRS-8.6.2
      - ROLE=manager
      - WORKER_COUNT=${WORKER_COUNT:-3}
      - ARCHIVE_DIR=/archive                                     # SRS-8.5.2
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["sleep", "infinity"]

  worker-1:
    image: claude-code-base:latest
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR}:/workspace:ro                            # Workers read-only
      - ${HOME}/.claude-state/account-w1:/home/node/.claude     # SRS-8.1.8
      # node_modules not needed: worker-server.js uses only global packages (redis)
      - ./scripts:/scripts:ro                                   # SRS-8.1.5
    networks:
      - orchestration-internal                                  # SRS-8.6.2
    env_file: .env                                              # SRS-8.6.1 secrets via env_file
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_1:-}
      - REDIS_HOST=redis                                        # SRS-8.6.2
      - REDIS_PORT=6379                                         # SRS-8.6.2
      - WORKER_NAME=worker-1                                    # SRS-8.1.7
      - WORKER_PORT=9000                                        # SRS-8.1.7
      - ROLE=worker
      - 'WORKER_PERSONA=You are Sentinel, a Security Analyst. Your mission is to identify vulnerabilities, hardcoded secrets, missing input validation, and authentication flaws in the provided code. Focus areas: hardcoded credentials, API keys, tokens, or secrets; SQL injection, command injection, XSS, and other injection flaws; missing or weak input validation and sanitization; authentication and authorization weaknesses; insecure cryptographic usage or data exposure; path traversal and file inclusion vulnerabilities. Respond ONLY with a JSON code block: {"summary":"...","findings":[{"category":"security","summary":"..."}],"status":"done"}'
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["node", "/scripts/worker-server.js"]              # SRS-8.1.5

  worker-2:
    image: claude-code-base:latest
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR}:/workspace:ro
      - ${HOME}/.claude-state/account-w2:/home/node/.claude
      # node_modules not needed: worker-server.js uses only global packages (redis)
      - ./scripts:/scripts:ro                                   # SRS-8.1.5
    networks:
      - orchestration-internal                                  # SRS-8.6.2
    env_file: .env                                              # SRS-8.6.1 secrets via env_file
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_2:-}
      - REDIS_HOST=redis                                        # SRS-8.6.2
      - REDIS_PORT=6379                                         # SRS-8.6.2
      - WORKER_NAME=worker-2                                    # SRS-8.1.7
      - WORKER_PORT=9000                                        # SRS-8.1.7
      - ROLE=worker
      - 'WORKER_PERSONA=You are Reviewer, a Code Quality Engineer. Your mission is to identify dead code, duplication, excessive complexity, and SOLID principle violations in the provided code. Focus areas: dead or unreachable code paths; code duplication that should be refactored; functions or classes with excessive cyclomatic complexity; Single Responsibility Principle violations; Open/Closed Principle violations; Dependency Inversion and Interface Segregation issues; poor naming conventions or misleading abstractions. Respond ONLY with a JSON code block: {"summary":"...","findings":[{"category":"quality","summary":"..."}],"status":"done"}'
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["node", "/scripts/worker-server.js"]

  worker-3:
    image: claude-code-base:latest
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ${PROJECT_DIR}:/workspace:ro
      - ${HOME}/.claude-state/account-w3:/home/node/.claude
      # node_modules not needed: worker-server.js uses only global packages (redis)
      - ./scripts:/scripts:ro                                   # SRS-8.1.5
    networks:
      - orchestration-internal                                  # SRS-8.6.2
    env_file: .env                                              # SRS-8.6.1 secrets via env_file
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_3:-}
      - REDIS_HOST=redis                                        # SRS-8.6.2
      - REDIS_PORT=6379                                         # SRS-8.6.2
      - WORKER_NAME=worker-3                                    # SRS-8.1.7
      - WORKER_PORT=9000                                        # SRS-8.1.7
      - ROLE=worker
      - 'WORKER_PERSONA=You are Profiler, a Performance Engineer. Your mission is to identify N+1 queries, blocking I/O, memory leaks, and bundle size issues in the provided code. Focus areas: N+1 query patterns and inefficient database access; blocking I/O operations in async contexts; memory leaks from unclosed resources or circular references; unnecessary large bundle sizes or heavy imports; missing pagination or unbounded data fetches; inefficient algorithms with poor time/space complexity. Respond ONLY with a JSON code block: {"summary":"...","findings":[{"category":"performance","summary":"..."}],"status":"done"}'
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["node", "/scripts/worker-server.js"]

networks:
  orchestration-internal:
    driver: bridge
    internal: true                                               # SRS-8.6.2

volumes:
  redis-data:
  node_modules_manager:
