# docker-compose.yml — Base config (Tier A: shared source)

services:
  claude-a:
    build:
      context: .
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-}
    image: claude-code-base:latest
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ${PROJECT_DIR}:/workspace
      - ${HOME}/.claude-state/account-a:/home/node/.claude
      # Host claude-config: shared settings (read-only overlay)
      - ${HOME}/.claude/hooks:/home/node/.claude/hooks:ro
      - ${HOME}/.claude/skills:/home/node/.claude/skills:ro
      - ${HOME}/.claude/commands:/home/node/.claude/commands:ro
      - ${HOME}/.claude/CLAUDE.md:/home/node/.claude/CLAUDE.md:ro
      - ${HOME}/.claude/commit-settings.md:/home/node/.claude/commit-settings.md:ro
      - ${HOME}/.claude/settings.json:/home/node/.claude/settings.json:ro
      # Host GitHub CLI auth (read-only)
      - ${HOME}/.config/gh:/home/node/.config/gh:ro
      - node_modules_a:/workspace/node_modules
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_A:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["sleep", "infinity"]

  claude-b:
    image: claude-code-base:latest
    depends_on:
      - claude-a
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ${PROJECT_DIR}:/workspace
      - ${HOME}/.claude-state/account-b:/home/node/.claude
      # Host claude-config: shared settings (read-only overlay)
      - ${HOME}/.claude/hooks:/home/node/.claude/hooks:ro
      - ${HOME}/.claude/skills:/home/node/.claude/skills:ro
      - ${HOME}/.claude/commands:/home/node/.claude/commands:ro
      - ${HOME}/.claude/CLAUDE.md:/home/node/.claude/CLAUDE.md:ro
      - ${HOME}/.claude/commit-settings.md:/home/node/.claude/commit-settings.md:ro
      - ${HOME}/.claude/settings.json:/home/node/.claude/settings.json:ro
      # Host GitHub CLI auth (read-only)
      - ${HOME}/.config/gh:/home/node/.config/gh:ro
      - node_modules_b:/workspace/node_modules
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_B:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["sleep", "infinity"]

volumes:
  node_modules_a:
  node_modules_b:
