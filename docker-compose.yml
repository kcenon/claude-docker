# docker-compose.yml — Base config (Tier A: shared source)

services:
  claude-a:
    build:
      context: .
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-}
    image: claude-code-base:latest
    working_dir: ${PROJECT_DIR}
    stdin_open: true
    tty: true
    volumes:
      - ${PROJECT_DIR}:${PROJECT_DIR}
      - ${HOME}/.claude-state/account-a:/home/node/.claude
      - ${HOME}/.claude:/home/node/.claude-host:ro
      - ${HOME}/.config/gh:/home/node/.config/gh:ro
      - node_modules_a:${PROJECT_DIR}/node_modules
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_A:-}
      - GH_TOKEN=${GH_TOKEN:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["sleep", "infinity"]

  claude-b:
    image: claude-code-base:latest
    depends_on:
      - claude-a
    working_dir: ${PROJECT_DIR}
    stdin_open: true
    tty: true
    volumes:
      - ${PROJECT_DIR}:${PROJECT_DIR}
      - ${HOME}/.claude-state/account-b:/home/node/.claude
      - ${HOME}/.claude:/home/node/.claude-host:ro
      - ${HOME}/.config/gh:/home/node/.config/gh:ro
      - node_modules_b:${PROJECT_DIR}/node_modules
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY_B:-}
      - GH_TOKEN=${GH_TOKEN:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["sleep", "infinity"]

volumes:
  node_modules_a:
  node_modules_b:
